<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-label="Workflow vs Agent comparison">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5F8A"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7D8A9A"/>
    </marker>
    <style>
      text{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{font-size:21px;font-weight:800;fill:#121B2E}
      .subtitle{font-size:12px;font-weight:600;fill:#667485}
      .panel{fill:#F8FAFC;stroke:#D5E0EA;stroke-width:1.5}
      .panel.workflow{fill:#FAFBFC}
      .panel.agent{fill:#F4F8FB}
      .panel-title{font-size:17px;font-weight:800;fill:#121B2E}
      .panel-sub{font-size:11px;font-weight:600;fill:#667485}
      .step{fill:#FFFFFF;stroke:#AFC4D7;stroke-width:1.4}
      .step-strong{fill:#E9F2FA;stroke:#2D5F8A;stroke-width:1.6}
      .step-text{font-size:12px;font-weight:760;fill:#172235}
      .step-note{font-size:10px;font-weight:600;fill:#5F6E80}
      .small{font-size:10px;font-weight:700;fill:#2D5F8A}
      .arrow{fill:none;stroke:#2D5F8A;stroke-width:1.8;marker-end:url(#arrow-blue)}
      .arrow-gray{fill:none;stroke:#7D8A9A;stroke-width:1.5;marker-end:url(#arrow-gray)}
      .loop{fill:none;stroke:#2D5F8A;stroke-width:2;marker-end:url(#arrow-blue)}
      .badge{fill:#FFFFFF;stroke:#C7D5E2;stroke-width:1.2}
      .divider{fill:#EEF4F8;stroke:#C7D5E2;stroke-width:1.2}
      .divider-title{font-size:12px;font-weight:850;fill:#1C466B}
      .divider-copy{font-size:10px;font-weight:700;fill:#5F6E80}
      .note-box{fill:#FFFFFF;stroke:#D8E2EB;stroke-width:1}
      .note-text{font-size:11px;font-weight:650;fill:#364354}
      .keyword{fill:#1C466B;font-weight:850}
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="430" fill="#FFFFFF"/>
  <text class="title" x="40" y="34">Workflow vs Agent：同一个目标，两种控制方式</text>
  <text class="subtitle" x="40" y="56">关键不是“有没有调用工具”，而是“下一步由预设流程决定，还是由系统根据状态动态决定”。</text>

  <rect class="panel workflow" x="40" y="82" width="380" height="282" rx="12"/>
  <text class="panel-title" x="230" y="113" text-anchor="middle">Workflow 工作流</text>
  <text class="panel-sub" x="230" y="132" text-anchor="middle">流程拥有控制权：路径预设，分支写死</text>

  <rect class="step" x="145" y="154" width="170" height="34" rx="7"/>
  <text class="step-text" x="230" y="176" text-anchor="middle">输入 / 事件</text>
  <path class="arrow" d="M230 188v18"/>

  <rect class="step-strong" x="128" y="206" width="204" height="38" rx="7"/>
  <text class="step-text" x="230" y="225" text-anchor="middle">Step 1：收集固定字段</text>
  <text class="step-note" x="230" y="238" text-anchor="middle">appid、接口、错误码...</text>
  <path class="arrow" d="M230 244v18"/>

  <g transform="translate(230 285)">
    <polygon points="0,-26 55,0 0,26 -55,0" fill="#FFF9ED" stroke="#D4A44E" stroke-width="1.4"/>
    <text class="step-text" x="0" y="-2" text-anchor="middle">字段齐全？</text>
    <text class="step-note" x="0" y="12" text-anchor="middle">固定分支</text>
  </g>
  <path class="arrow" d="M285 285h52v44h-58"/>
  <text class="small" x="314" y="276" text-anchor="middle">否</text>
  <rect class="step" x="337" y="313" width="70" height="32" rx="7"/>
  <text class="step-note" x="372" y="333" text-anchor="middle">固定追问</text>

  <path class="arrow" d="M230 311v21"/>
  <text class="small" x="216" y="326" text-anchor="middle">是</text>
  <rect class="step" x="133" y="332" width="194" height="34" rx="7"/>
  <text class="step-text" x="230" y="354" text-anchor="middle">查 SOP → 输出模板</text>

  <rect class="note-box" x="70" y="381" width="320" height="30" rx="7"/>
  <text class="note-text" x="230" y="401" text-anchor="middle">优势：稳定、可控；代价：遇到新情况要改流程</text>

  <rect class="divider" x="438" y="150" width="44" height="154" rx="22"/>
  <text class="divider-title" x="460" y="184" text-anchor="middle">
    <tspan x="460" dy="0">分水岭</tspan>
    <tspan x="460" dy="20">谁决定</tspan>
    <tspan x="460" dy="20">下一步</tspan>
  </text>
  <path class="arrow-gray" d="M438 226h-28"/>
  <path class="arrow-gray" d="M482 226h28"/>
  <text class="divider-copy" x="460" y="281" text-anchor="middle">控制权</text>

  <rect class="panel agent" x="500" y="82" width="380" height="282" rx="12"/>
  <text class="panel-title" x="690" y="113" text-anchor="middle">Agent 智能体</text>
  <text class="panel-sub" x="690" y="132" text-anchor="middle">目标拥有控制权：每轮观察状态，再决定动作</text>

  <rect class="step-strong" x="584" y="150" width="212" height="38" rx="18"/>
  <text class="step-text" x="690" y="173" text-anchor="middle">目标：解决“签名失败”</text>

  <rect class="step" x="552" y="218" width="114" height="46" rx="9"/>
  <text class="step-text" x="609" y="239" text-anchor="middle">观察</text>
  <text class="step-note" x="609" y="254" text-anchor="middle">用户 / 日志 / 文档</text>

  <rect class="step" x="714" y="218" width="114" height="46" rx="9"/>
  <text class="step-text" x="771" y="239" text-anchor="middle">思考</text>
  <text class="step-note" x="771" y="254" text-anchor="middle">缺什么 / 查哪里</text>

  <rect class="step" x="714" y="297" width="114" height="46" rx="9"/>
  <text class="step-text" x="771" y="318" text-anchor="middle">行动</text>
  <text class="step-note" x="771" y="333" text-anchor="middle">追问 / 调工具</text>

  <rect class="step" x="552" y="297" width="114" height="46" rx="9"/>
  <text class="step-text" x="609" y="318" text-anchor="middle">反馈</text>
  <text class="step-note" x="609" y="333" text-anchor="middle">更新状态</text>

  <path class="loop" d="M666 241h40"/>
  <path class="loop" d="M771 264v25"/>
  <path class="loop" d="M714 320h-40"/>
  <path class="loop" d="M609 297v-25"/>

  <rect class="badge" x="532" y="191" width="62" height="24" rx="12"/>
  <text class="small" x="563" y="207" text-anchor="middle">Docs</text>
  <rect class="badge" x="606" y="191" width="62" height="24" rx="12"/>
  <text class="small" x="637" y="207" text-anchor="middle">Logs</text>
  <rect class="badge" x="680" y="191" width="62" height="24" rx="12"/>
  <text class="small" x="711" y="207" text-anchor="middle">Skill</text>
  <rect class="badge" x="754" y="191" width="82" height="24" rx="12"/>
  <text class="small" x="795" y="207" text-anchor="middle">Human Gate</text>

  <rect class="note-box" x="530" y="381" width="320" height="30" rx="7"/>
  <text class="note-text" x="690" y="401" text-anchor="middle">优势：能处理变化；前提：边界、审计、最大步数</text>
</svg>
