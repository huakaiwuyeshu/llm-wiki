<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 410" role="img" aria-label="Workflow vs Agent comparison">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5F8A"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7D8A9A"/>
    </marker>
    <style>
      text{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .lane{stroke:#D5E0EA;stroke-width:1.6}
      .workflow{fill:#FBFCFD}
      .agent{fill:#F4F8FB}
      .lane-title{font-size:22px;font-weight:850;fill:#121B2E}
      .lane-sub{font-size:12px;font-weight:700;fill:#667485}
      .box{fill:#FFFFFF;stroke:#AFC4D7;stroke-width:1.6}
      .box-blue{fill:#E9F2FA;stroke:#2D5F8A;stroke-width:1.9}
      .box-warm{fill:#FFF9ED;stroke:#D4A44E;stroke-width:1.6}
      .box-green{fill:#F4FAF5;stroke:#83A985;stroke-width:1.6}
      .txt{font-size:15px;font-weight:820;fill:#172235}
      .note{font-size:11px;font-weight:680;fill:#5F6E80}
      .small{font-size:11px;font-weight:780;fill:#38536A}
      .arrow{fill:none;stroke:#2D5F8A;stroke-width:2.1;marker-end:url(#arrow-blue)}
      .arrow-gray{fill:none;stroke:#7D8A9A;stroke-width:1.6;marker-end:url(#arrow-gray)}
      .dash{fill:none;stroke:#A8B8C8;stroke-width:1.6;stroke-dasharray:7 8}
      .divider{fill:#FFFFFF;stroke:#C7D5E2;stroke-width:1.3}
      .divider-label{font-size:13px;font-weight:880;fill:#1C466B}
      .pill{fill:#FFFFFF;stroke:#C7D5E2;stroke-width:1.3}
      .pill-text{font-size:12px;font-weight:800;fill:#1C466B}
      .summary{fill:#FFFFFF;stroke:#D8E2EB;stroke-width:1.1}
      .summary-text{font-size:12px;font-weight:760;fill:#344154}
    </style>
  </defs>

  <rect width="920" height="410" fill="#FFFFFF"/>

  <rect class="lane workflow" x="44" y="26" width="832" height="138" rx="18"/>
  <text class="lane-title" x="460" y="55" text-anchor="middle">Workflow 工作流</text>
  <text class="lane-sub" x="460" y="75" text-anchor="middle">控制权在流程：下一步由预设步骤和分支决定</text>

  <rect class="box" x="96" y="98" width="118" height="42" rx="8"/>
  <text class="txt" x="155" y="124" text-anchor="middle">Input</text>
  <path class="arrow" d="M214 119h72"/>

  <rect class="box-blue" x="286" y="94" width="146" height="50" rx="10"/>
  <text class="txt" x="359" y="115" text-anchor="middle">Step 1</text>
  <text class="note" x="359" y="132" text-anchor="middle">固定处理逻辑</text>
  <path class="arrow" d="M432 119h60"/>

  <g transform="translate(548 119)">
    <polygon class="box-warm" points="0,-36 62,0 0,36 -62,0"/>
    <text class="txt" x="0" y="-4" text-anchor="middle">Branch</text>
    <text class="note" x="0" y="13" text-anchor="middle">预设分支</text>
  </g>
  <path class="arrow" d="M610 119h78"/>

  <ellipse class="box-green" cx="756" cy="119" rx="64" ry="34"/>
  <text class="txt" x="756" y="115" text-anchor="middle">Output</text>
  <text class="note" x="756" y="132" text-anchor="middle">模板结果</text>

  <rect class="summary" x="304" y="148" width="312" height="23" rx="12"/>
  <text class="summary-text" x="460" y="164" text-anchor="middle">新情况出现时，通常要改流程或补分支</text>

  <line class="dash" x1="72" y1="190" x2="848" y2="190"/>
  <rect class="divider" x="338" y="176" width="244" height="30" rx="15"/>
  <text class="divider-label" x="460" y="196" text-anchor="middle">分水岭：下一步由谁决定</text>

  <rect class="lane agent" x="44" y="222" width="832" height="160" rx="18"/>
  <text class="lane-title" x="460" y="252" text-anchor="middle">Agent 智能体</text>
  <text class="lane-sub" x="460" y="272" text-anchor="middle">控制权在目标和状态：LLM 每一轮重新决定下一步</text>

  <rect class="box" x="94" y="304" width="132" height="52" rx="9"/>
  <text class="txt" x="160" y="326" text-anchor="middle">目标 + 状态</text>
  <text class="note" x="160" y="344" text-anchor="middle">问题 / 上下文 / 进度</text>
  <path class="arrow" d="M226 330h64"/>

  <rect class="box-blue" x="290" y="292" width="170" height="76" rx="14"/>
  <text class="txt" x="375" y="322" text-anchor="middle">LLM 决策</text>
  <text class="note" x="375" y="342" text-anchor="middle">看状态，选下一步</text>

  <path class="arrow" d="M460 330h48"/>
  <rect class="box-green" x="508" y="292" width="314" height="76" rx="14"/>
  <text class="txt" x="665" y="318" text-anchor="middle">下一步动作池</text>
  <text class="note" x="665" y="340" text-anchor="middle">追问缺口 ｜ 查资料 ｜ 调工具 ｜ 交给人工</text>
  <text class="small" x="665" y="357" text-anchor="middle">动作结果写回状态，再进入下一轮判断</text>

  <path class="arrow-gray" d="M665 368 C570 396, 272 392, 166 358"/>
  <rect class="pill" x="530" y="374" width="270" height="26" rx="13"/>
  <text class="pill-text" x="665" y="391" text-anchor="middle">能力来源：Tool / Memory / Knowledge / Gate</text>
</svg>
