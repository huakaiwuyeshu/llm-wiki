<!doctype html><html lang="zh-CN"><head><meta charset="utf-8" /><title>封面</title><style>

@font-face {

}

@font-face {

}

}

body {

  line-height: 1.62;

}

strong {

}

code {

  color: #173d5c;

}

p {

}

.part-start.final-part {

}

.opening {

}

.opening-a {

}

}

}

.opening-thesis p {

  font-size: 13.6pt;

}

.opening-thesis strong {

}

.opening-thesis span {

}

.opening-question {

}

.opening-card {

.why-card p {

}

.pm-shift em {

.pm-shift p {

.opening-thesis.closing {

  font-weight: 850;

  margin-bottom: 2.6mm;
}

h2 {
  margin: 0;
  color: #111827;
  font-family: "Noto Serif SC Local", "Noto Sans SC Local", serif;
  font-size: 19.4pt;
  line-height: 1.28;
  font-weight: 850;
}

h3 {

ol {

.quote {

}

.evo-table {

}

.evo-row {

  grid-template-columns: 9mm 38mm 21mm 1fr;
  gap: 3mm;
  align-items: center;
  padding: 2.7mm 3.2mm;
  border-bottom: 1px solid var(--line);

}

.evo-row:last-child {

.evo-name {

.knowledge {

}

.base {

.stage-card:nth-child(2) {

}

.stage-card:nth-child(3) {

.harness-triad p {

  grid-template-columns: 1fr 1fr;

}

.visual-module {

.load-card span,
.landing-step span,

  background: var(--accent);
  font-size: 7.4pt;
  font-weight: 850;

.load-card b {

  margin-top: 2mm;

.load-card strong {

.load-card p,

.state-track .visual-title {

.state-track .state-grid {

}

.meta-label {

  font-weight: 850;
}

.meta-value {

pre {

  font-size: 9.2pt;
  font-weight: 850;

svg {

}

.chart-bg {
  fill: #fbfcfd;
  stroke: #e2e8f0;
  stroke-width: 1;
}

.panel {
  fill: #fbfcfd;
  stroke: #e2e8f0;
}

.accent-panel {
  fill: #f5f9fc;
  stroke: #c7d8e7;
}

.node,
.step {
  fill: #ffffff;
  stroke: #a9bdcf;
  stroke-width: 1.2;
}

.node.endpoint {
  fill: #e8f0f7;
  stroke: #8fb0ca;

.node.alt {
  fill: #f3f7fb;
}

.node.decision {
  fill: #ffffff;
  stroke: #2d5f8a;
}

.llm-node {
  fill: #fbf6ea;
  stroke: #d7bf82;
}

.support-node {
  fill: #f3f6f9;
  stroke: #cbd5e1;
}

.chain-a {
  fill: #eef5fb;
}

.chain-b {
  fill: #f7f7f2;
}

.chain-c {
  fill: #f3f6f9;
}

.lane-title,
.lane {
  fill: #e8f0f7;
  stroke: #b9c8d7;
}

.stage {
  stroke: #cbd5e1;
  stroke-width: 1.1;
}

.stage.base {
  fill: #f8fafc;
}

.stage.knowledge {
  fill: #e8f0f7;
}

.stage.capability {
  fill: #f7f2e7;
}

.stage.quality {
  fill: #eef6f1;
}

.dot {
  fill: #2d5f8a;
}

.edge {
  fill: none;
  stroke: #2d5f8a;
  stroke-width: 1.8;
}

.edge.small {
  stroke-width: 1.5;
}

.edge.back,
.edge.attach {
  stroke-dasharray: 5 4;
}

.edge.faint {
  stroke: #93a7ba;
  stroke-width: 1.2;
}

.timeline {
  fill: none;
  stroke: #8fb0ca;
  stroke-width: 2;
}
